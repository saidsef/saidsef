name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: 3.11
    - uses: terraform-linters/setup-tflint@v6
    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: "-a"
    - name: set matrix
      id: set-matrix
      run: |
        chmod +x ./scripts/generate-versions.sh
        echo "versions=$(./scripts/generate-versions.sh)" >> "$GITHUB_OUTPUT""

  validate:
    name: Validate
    needs: [pre-commit]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      fail-fast: true
      matrix:
        tf-version: ${{ fromJson(needs.pre-commit.outputs.versions) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ matrix.tf-version }}
    - name: Terraform Init
      run: |
        terraform init -backend=false -upgrade -reconfigure
    - name: Terraform FMT
      run: |
        terraform fmt -check -recursive
    - name: Terraform Validate
      run: |
        terraform validate
    - name: Terraform Version / Providers
      run: |
        terraform version
        terraform providers
    - name: Examples Complete Validate
      run: |
        cd examples/complete
        terraform init -backend=false -upgrade -reconfigure
        terraform validate
    - name: Example Remote Validate
      run: |
        cd examples/remote
        terraform init -backend=false -upgrade -reconfigure
        terraform validate

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: "--force-all-dirs --concise-output --code-theme=dark"
          version: "latest"
          github_token: ${{ github.token }}

  attest:
    if:  contains(github.ref, 'main')
    name: attest
    runs-on: ubuntu-latest
    needs: [tfsec]
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: '*.tf'

  auto-approve:
    if: contains(github.event_name, 'pull_request')
    runs-on: ubuntu-latest
    needs: [validate, tfsec]
    steps:
    - name: Auto Approve PR
      uses: actions/github-script@v8
      with:
       github-token: ${{ github.token }}
       script: |
        github.rest.pulls.createReview({
          owner: context.repo.owner,
          repo: context.repo.repo,
          pull_number: context.issue.number,
          event: "APPROVE"
        })
